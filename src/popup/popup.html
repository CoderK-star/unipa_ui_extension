<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UNIPA UI ヘルパー</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>UNIPA UI ヘルパー</h1>

      <label class="row">
        <span>
          <strong>自動保存</strong>
          <small>編集可能な入力欄をローカルに保存します。</small>
        </span>
        <input id="autosaveEnabled" type="checkbox">
      </label>

      <label class="row">
        <span>
          <strong>セッション維持</strong>
          <small>有効化した場合のみ、5分ごとに軽量なリクエストを送信します。</small>
        </span>
        <input id="keepaliveEnabled" type="checkbox">
      </label>

      <label class="field">
        <span>維持間隔（分）</span>
        <input id="keepaliveIntervalMinutes" type="number" min="5" max="30" step="1">
      </label>

      <section class="status">
        <span>状態</span>
        <strong id="keepaliveStatus">未確認</strong>
      </section>

      <button id="clearData" class="danger" type="button">ローカルデータを削除</button>
      <p id="message" role="status"></p>
    </main>

    <script src="../shared/constants.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
